---
# Source: Monumenta Java Shard/templates/deployment.yaml
# Service / network ports

apiVersion: v1
kind: Service
metadata:
  name: futurama
  namespace: build
  labels:
    app: futurama
    k8s-app: monumenta-metrics
spec:
  type: ClusterIP
  selector:
    app: futurama
  ports:
  # Main minecraft port
  - name: "25566"
    port: 25566
    targetPort: 25566
  - name: metrics
    port: 9225
    targetPort: 9225
  # - name: jdb
  #   port: 9000
  #   targetPort: 9000

