apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: playmonumenta-cloudflare-cert
  namespace: web
spec:
  # The secret name where cert-manager should store the signed certificate
  secretName: playmonumenta-cloudflare-tls
  dnsNames:
    - playmonumenta.com
    - "*.playmonumenta.com"
  # Duration of the certificate
  duration: 131400h # 15 years
  # Renew a day before the certificate expiration
  renewBefore: 168h # 7 days
  # Reference the Origin CA Issuer you created above, which must be in the same namespace.
  issuerRef:
    group: cert-manager.k8s.cloudflare.com
    kind: OriginIssuer
    name: cloudflare-origin-issuer