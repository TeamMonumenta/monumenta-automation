name: Reviewdog checks
# This is a common script, so we only listen to workflow_call
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
# Jobs
jobs:
  reviewdog:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
    # Set up JDK
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'
    # Git config, not sure why this is needed?
    - name: Apply global Git config
      run: |
        git config --global user.name "Monumenta CI"
        git config --global user.email "Monumenta.CI@NotARealEmail.com"
    # Cache gradle dependencies
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    # Reviewdog
    - name: Setup reviewdog
      uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252 # 1.4.0
      with:
        reviewdog_version: latest
    # Reviewdog stuff...
    - name: Build and report style/pmd/warnings
      working-directory: ${{ inputs.working-directory }}
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -o pipefail
        ./gradlew build --console=plain 2>&1 | tee compile.log
        set +o pipefail

        # compiler warnings
        cat compile.log | reviewdog -efm="%W%f:%l: warning: %m" -efm="%+C%[ %\t]%.%#" -efm="%-Z%[%^ %\t]%.%#" -efm="%f:%l:%[ %\t]%#%m" -name="Javac" -level=error -fail-level=error -reporter=github-pr-review

        # Allow the * globs below to match 0 files without throwing an error
        # The indentation on the below loops is flat to conform to this yaml file - they won't work indented
        shopt -s nullglob

        # checkstyle
        for xml in */build/reports/checkstyle/main.xml build/reports/checkstyle/main.xml; do
        if [ -f "$xml" ]; then
        xmldirname="${xml%%/*}"
        cat "$xml" | reviewdog -f=checkstyle -name="Checkstyle $xmldirname" -level=error -fail-level=error -reporter=github-pr-review
        fi
        done

        # pmd
        for xml in */build/reports/pmd/main.xml build/reports/pmd/main.xml; do
        if [ -f "$xml" ]; then
        xmldirname="${xml%%/*}"
        cat "$xml" | reviewdog -efm='%+P<file name="%f">' -efm='%W<violation beginline="%l%.%#begincolumn="%c%.%#' -efm='%-C<%.%#' -efm='%+C%.%#' -efm='%-Q' -name="PMD $xmldirname" -level=error -fail-level=error -reporter=github-pr-review
        fi
        done
