name: Build and publish master
# This is a common script, so we only listen to workflow_call
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
    secrets:
      MAVEN_TOKEN:
        required: true
# Jobs
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0
    # Set up JDK
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: temurin
        java-version: '21'
    # Git config, not sure why this is needed?
    - name: Apply global Git config
      run: |
          git config --global user.name "Monumenta CI"
          git config --global user.email "Monumenta.CI@NotARealEmail.com"
    # No caching for publish - clean build for security
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      with:
        cache-disabled: true
    - name: Git status after setup-gradle
      run: git status
    # Run publishing
    - name: Publish to Monumenta Maven
      working-directory: ${{ inputs.working-directory }}
      env:
        USERNAME: monumenta
        TOKEN: ${{ secrets.MAVEN_TOKEN }}
      run: |
        ./gradlew publish
